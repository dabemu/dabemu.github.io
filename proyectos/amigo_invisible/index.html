<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amigo invisible</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header">
        <h1>Amigo invisible</h1>
    </div>
    <div id="descripcion">
        <p>Añade participantes y mira tu amigo invisible:</p>
    </div>
    <div id="introducirParticipantes">
    <form action="">
        <label for="nombre">Introduce:</label>
        <input type="text" id="nombre" placeholder="Nombre del amigo">
        <input type="submit" value="Añade amigo" id="botonAnyadir">
        <input type="button" value="Resuelve" id="botonResuelve">
    </form>
    </div>
    <div id="listaParticipantes">
    <div id="panel"></div>
    <div id="intermedio"></div>
    <div id="solucion"></div>
    <script src="js/app.js"></script>
    </div>
</body>
</html>
