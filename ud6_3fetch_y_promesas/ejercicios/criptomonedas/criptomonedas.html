<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor cripto simple</title>

</head>
<body>
  <div class="contenedor">
    <h1>Conversor de criptomonedas</h1>

    <div class="formulario">
      Euros: <input type="number" id="cantidad" value="100" min="0" step="0.01">
      <input type="button" id="convertir" value="Convertir">
    </div>

    <div id="resultados" class="resultados"></div>
    <p id="error" class="error"></p>
  </div>

  <script>
    // variables
let moneda = "EUR";
let listaCriptos = ["BTC", "ETH", "SOL", "DOGE"]; // He renombrado para no chocar con la variable 'lista'
let cantidadInput = document.getElementById("cantidad");
let convertirBtn = document.getElementById("convertir");
let resultados = document.getElementById("resultados");
let error = document.getElementById("error");
// por estética redondearía a 2 decimales el precio de cada cripto
//pero lo dejo porque es importante el valor real.
/*
  Crea el nodo LI con el cálculo de la conversión
*/
function creaElemento(cripto, cambio, inversion) { 
  // Calculamos cuántas monedas compramos: Euros / Precio
  let totalCrypto = parseFloat(inversion) / parseFloat(cambio);
  
  let liElement = document.createElement("li");
  
  // Usamos toFixed(2) para el precio y toFixed(8) para la cantidad de cripto (que es más pequeña)
  liElement.innerHTML = `<strong>${cripto}</strong>: 1 unidad = ${parseFloat(cambio).toFixed(2)}€ 
   | Comprarías: 
   <b>${totalCrypto.toFixed(8)} ${cripto}</b>`;
  
  return liElement;
}

async function convertir() {
  error.textContent = "";
  resultados.innerHTML = "";
  
  const valorInvertido = parseFloat(cantidadInput.value);

  // Validación
  if (isNaN(valorInvertido) || valorInvertido <= 0) {
    error.textContent = "Introduce una cantidad válida";
    return;
  }

  // Creamos el contenedor de la lista una sola vez
  let ulElement = document.createElement("ul");
  resultados.appendChild(ulElement);

  // Iteramos la lista de criptos
  listaCriptos.forEach((cripto) => {
    let url = `https://api.coinbase.com/v2/prices/${cripto}-${moneda}/spot`;

    fetch(url)
      .then(response => response.json())
      .then(datos => {
        /* ACABALO */
        let cambio = datos.data.amount;
        
        // Llamamos a la función que crea el LI y lo añadimos al UL
        let nuevoLi = creaElemento(cripto, cambio, valorInvertido);
        ulElement.appendChild(nuevoLi);
        /* FIN ACABALO */
      })
      .catch(e => {
        console.error("ERROR: " + e);
        error.textContent = "Error al obtener los datos de " + cripto;
      });
  });
}

// Eventos
convertirBtn.addEventListener("click", () => {
  convertir();
});
    //main
  </script>
</body>
</html>
